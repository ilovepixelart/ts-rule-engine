name: PR check

on:
  workflow_dispatch:
  # Trigger on push to main or pull requests
  push:
    branches:
      - main
      - feature*

  pull_request:
    types: [opened, synchronize, reopened]

# Declare default permissions as read only. No job in this workflow writes to
# the repo — tests, biome, type-check, coverage, and SonarCloud all run in
# read-only mode. SonarCloud PR decorations come from the SonarCloud GitHub
# App, not GITHUB_TOKEN write scopes.
permissions:
  contents: read

jobs:
  tests:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Installing dependencies
        run: npm ci

      - name: Type check
        run: npm run type:check

      - name: Coverage
        run: npm run test

  sonar:
    name: Biome, Coverage & Sonar
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Installing dependencies
        run: npm ci

      - name: Verify provenance signatures
        run: npm audit signatures

      - name: Biome
        run: npm run biome

      - name: Type check tests
        run: npm run type:check:tests

      - name: Coverage
        run: npm run test

      - name: Scan
        if: env.SONAR_TOKEN
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=ilovepixelart
            -Dsonar.projectName=ts-rule-engine
            -Dsonar.projectKey=ilovepixelart_ts-rule-engine
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.test.exclusions=tests/**
            -Dsonar.coverage.exclusions=tests/**
